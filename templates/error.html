<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ code }} - Synergy Hub Africa</title>
  <meta name="description" content="Synergy Hub Africa - {{ message }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/synergy_logo.png') }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .error-img {
      display: block;
      height: 100px;
      width: auto;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 20px rgba(200, 169, 110, 0.15));
    }
    .error-brand {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c8a96e, #e8d5a8, #c8a96e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 35px;
    }
    .error-bar {
      width: 200px;
      height: 2px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 50px;
    }
    .error-bar::after {
      content: '';
      display: block;
      width: 60px;
      height: 100%;
      background: linear-gradient(135deg, #c8a96e, #a8883e);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #c8a96e, #e8d5a8, #c8a96e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .error-message {
      font-size: 1rem;
      color: #999;
      margin: 15px 0 40px;
      letter-spacing: 2px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: linear-gradient(135deg, #c8a96e, #a8883e);
      color: #0a0a0a;
      text-decoration: none;
      font-weight: 600;
      border-radius: 50px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200, 169, 110, 0.3); }
    @keyframes loading {
      0% { transform: translateX(-60px); }
      100% { transform: translateX(260px); }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <img src="{{ url_for('static', filename='images/synergy_logo.png') }}" alt="Synergy Hub Africa" class="error-img">
    <div class="error-brand">Synergy Hub Africa</div>
    <div class="error-bar"></div>
    <div class="error-code">{{ code }}</div>
    <div class="error-divider" style="width:60px;height:2px;background:linear-gradient(135deg,#c8a96e,#a8883e);margin:0 auto 15px;border-radius:2px"></div>
    <div class="error-message">{{ message }}</div>
    <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>
  <script>
    setTimeout(function() {
      history.back();
    }, 2000);
  </script>
</body>
</html>
